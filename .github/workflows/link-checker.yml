# ============================================================
# FILE: .github/workflows/link-checker.yml
# Automatically checks for dead links on every PR
# ============================================================

name: Link Checker
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am — catch links that die over time

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --exclude-mail
            --exclude 'localhost'
            --exclude 'example.com'
            '**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

