# GitHub Actions Automation
# Copy each section into its own .yml file in .github/workflows/

# ============================================================
# FILE: .github/workflows/link-checker.yml
# Automatically checks for dead links on every PR
# ============================================================

name: Link Checker
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am — catch links that die over time

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --exclude-mail
            --exclude 'localhost'
            --exclude 'example.com'
            '**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

---
# ============================================================
# FILE: .github/workflows/markdown-lint.yml
# Enforces markdown formatting standards on every PR
# ============================================================

name: Markdown Lint
on:
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: '.markdownlint.json'
          globs: |
            **/*.md
            !node_modules

---
# ============================================================
# FILE: .github/workflows/welcome-bot.yml
# Automatically welcomes first-time contributors
# ============================================================

name: Welcome Bot
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const actor = context.actor;

            // Check if this is the user's first PR/issue
            const prs = await github.rest.pulls.list({
              owner, repo, state: 'all'
            });
            const issues = await github.rest.issues.listForRepo({
              owner, repo, state: 'all'
            });

            const prCount = prs.data.filter(pr => pr.user.login === actor).length;
            const issueCount = issues.data.filter(i => i.user.login === actor).length;

            if (prCount + issueCount === 1) {
              const message = context.eventName === 'pull_request_target'
                ? `👋 Welcome, @${actor}! Thanks for your first contribution to the AI Engineering Handbook!\n\n` +
                  `A maintainer will review your PR within **48 hours**. In the meantime:\n\n` +
                  `- Make sure your PR fills out the template completely\n` +
                  `- Check that all links are working\n` +
                  `- Review the [style guide](../blob/main/CONTRIBUTING.md#-style-guide)\n\n` +
                  `We're glad you're here. 🙏`
                : `👋 Welcome, @${actor}! Thanks for opening your first issue.\n\n` +
                  `We'll take a look within **48 hours**. The more detail you provide, the faster we can help.\n\n` +
                  `In the meantime, check our [Contributing Guide](../blob/main/CONTRIBUTING.md) if you'd like to fix this yourself!`;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.issue.number,
                body: message
              });
            }

---
# ============================================================
# FILE: .github/workflows/stale-bot.yml
# Marks stale issues/PRs and closes them after inactivity
# ============================================================

name: Stale Bot
on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days. We'll close it in 7 days unless there's new activity.
            If this is still relevant, please comment to keep it open!
          stale-pr-message: >
            This PR has been inactive for 14 days. We'll close it in 7 days unless there's new activity.
            Need help finishing it? Leave a comment and a maintainer will assist!
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this becomes relevant again.
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-stale: 30
          days-before-close: 7
          days-before-pr-stale: 14


